<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер расходов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1> Трекер расходов</h1>
        
        <!-- Баланс -->
        <div class="balance">
            <div class="balance-label">Текущий баланс</div>
            <div class="balance-amount" id="balanceDisplay">0 ₽</div>
            <div class="balance-details">
                <div class="income">Доходы: <span id="totalIncome">0 ₽</span></div>
                <div class="expense">Расходы: <span id="totalExpense">0 ₽</span></div>
            </div>
        </div>

        <!-- Форма -->
        <div class="form">
            <div class="form-row">
                <div class="field">
                    <label for="transactionType">Тип:</label>
                    <select id="transactionType">
                        <option value="income"> Доход</option>
                        <option value="expense"> Расход</option>
                    </select>
                </div>
                <div class="field">
                    <label for="transactionCategory">Категория:</label>
                    <select id="transactionCategory">
                        <option value="Еда"> Еда</option>
                        <option value="Транспорт"> Транспорт</option>
                        <option value="Жильё"> Жильё</option>
                        <option value="Зарплата"> Зарплата</option>
                        <option value="Развлечения"> Развлечения</option>
                        <option value="Здоровье"> Здоровье</option>
                        <option value="Другое"> Другое</option>
                    </select>
                </div>
            </div>
            
            <div class="form-row">
                <div class="field">
                    <label for="transactionAmount">Сумма:</label>
                    <input type="number" id="transactionAmount" placeholder="1000" min="0.01" step="0.01" required>
                </div>
                <div class="field">
                    <label for="transactionDate">Дата:</label>
                    <input type="date" id="transactionDate" required>
                </div>
            </div>
            
            <div class="field">
                <label for="transactionDescription">Описание:</label>
                <input type="text" id="transactionDescription" placeholder="Обед в кафе">
            </div>
            
            <button id="addBtn"> Добавить</button>
        </div>

        <!-- Список операций -->
        <div class="transactions">
            <h2>История операций</h2>
            <div id="transactionsList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
